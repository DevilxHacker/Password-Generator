<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
</head>
<body class="bg-blue-400">
    <h1 class=" m-4 mt-20 text-5xl font-extrabold tracking-wider text-center  text-black-900 md:text-5xl lg:text-6xl dark:text-white">Generate Password</h1>

    <div class="flex items-center bg-gray-100 h-20 rounded-lg p-2 shadow-md w-3/5 m-auto  mt-10">
        
        <input id="generatedPassword"
          type="text"
          value="lsjdflkjjfd&^&*^"
          class="w-full text-2xl flex-grow bg-transparent outline-none px-2 text-gray-700 text-center"
        />
      
        <span class="material-symbols-outlined cursor-pointer text-5xl" onclick="copyPassword()">
            content_copy
          </span>
          <span class="material-symbols-outlined cursor-pointer text-5xl" onclick="NewPassword(); ">
            autorenew
          </span>
      </div>


      <div class="bg-blue-100 p-4 rounded-lg shadow-md mt-20 w-3/5 m-auto">
        <h2 class="font-bold text-xl mb-4 flex justify-center">Customize your password</h2>
        <div class= "mb-4 flex justify-center ">
          <label for="password-length" class="block font-medium text-gray-700 ">Password Length:</label>
          <div class="flex  items-center gap-x-5">
            <input type="number" id="password-length" value="10" min="1" max="50" onchange="updateTextInput(this.value)" class="w-16 text-center text-gray-900 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 " />
            <input type="range" id="password-length-slider" min="1" max="50" value="10" onchange="updateRangeInput(this.value)" class="w-30 h-4 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500" />
            <div class="flex-grow ml-2">
            </div>
          </div>
        </div>
        <div class="flex flex-col gap-2 ">
          <div class="flex items-center flex justify-center">
            <input type="checkbox" id="lowercase" checked="true" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 rounded" />
            <label for="lowercase" class="ml-2 text-gray-700">Lowercase</label>
          </div>
          <div class="flex items-center flex justify-center">
            <input type="checkbox" id="uppercase" checked="true" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 rounded" />
            <label for="uppercase" class="ml-2 text-gray-700">Uppercase</label>
          </div>
          <div class="flex items-center flex justify-center">
            <input type="checkbox" id="numbers" checked="true" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 rounded" />
            <label for="numbers" class="ml-2 text-gray-700">Numbers</label>
          </div>
          <div class="flex items-center justify-center">
            <input type="checkbox" id="symbols" checked="true" class=" w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 rounded" />
            <label for="symbols" class="ml-2 text-gray-700">Symbols</label>
          </div>
          <div class="flex justify-center">
          <button onclick="NewPassword()" class=" mt-4 bg-blue-600 text-white font-semibold py-2 px-4  rounded-lg w-1/3 hover:bg-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">Generate Password</button>
        </div>
        </div>
      </div>
      <script src="index.js"></script>
</body>
</html>
